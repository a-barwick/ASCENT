name: ascent

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ascent
      POSTGRES_PASSWORD: ascent
      POSTGRES_USER: ascent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent -d ascent"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - ascent-postgres:/var/lib/postgresql/data

  migrate:
    image: postgres:17-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ascent:ascent@postgres:5432/ascent?sslmode=disable
    entrypoint: ["/bin/sh", "/workspace/scripts/migrate.sh"]
    volumes:
      - ./:/workspace:ro
    working_dir: /workspace

volumes:
  ascent-postgres:
